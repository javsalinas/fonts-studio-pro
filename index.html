<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sticker Font Studio Pro 🖋️</title>
    <style>
      :root {
        --bg-color: #ffffff;
        --text-color: #000000;
        --accent-color: #5E0B2C; /* Burdeos Violeto */
        --border-color: #000000;
        --secondary-bg: #f5f5f5;
      }

      body { 
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
        margin: 0; 
        background: var(--bg-color); 
        color: var(--text-color);
        display: flex;
        justify-content: center;
        min-height: 100vh;
      }

      .app-container { 
        width: 100%;
        max-width: 500px; 
        padding: 2rem 1rem; 
        box-sizing: border-box;
      }

      h1 { font-weight: 800; text-align: center; margin-bottom: 2rem; letter-spacing: -1px; }

      /* Auth Styles */
      #auth-section, #app-section {
        display: none;
        flex-direction: column;
        gap: 1.5rem;
      }

      .card {
        border: 1px solid var(--border-color);
        padding: 1.5rem;
        border-radius: 0;
        background: var(--bg-color);
      }

      .input-group {
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
        margin-bottom: 1rem;
      }

      input {
        padding: 0.8rem;
        border: 1px solid var(--border-color);
        border-radius: 0;
        font-size: 1rem;
        outline: none;
      }

      input:focus {
        border-color: var(--accent-color);
      }

      button {
        padding: 0.8rem;
        background: var(--text-color);
        color: var(--bg-color);
        border: 1px solid var(--border-color);
        cursor: pointer;
        font-weight: 600;
        text-transform: uppercase;
        font-size: 0.8rem;
        transition: all 0.2s;
      }

      button:hover {
        background: var(--accent-color);
        border-color: var(--accent-color);
      }

      button.secondary {
        background: transparent;
        color: var(--text-color);
      }

      /* App Styles */
      .font-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0.8rem;
        border-bottom: 1px solid #eee;
        cursor: pointer;
        transition: background 0.2s;
      }

      .font-item:hover, .font-item.active {
        background: var(--secondary-bg);
        border-left: 4px solid var(--accent-color);
      }

      #sticker-preview-container {
        position: relative;
        width: 100%;
        height: 250px;
        background-image: 
          linear-gradient(45deg, #eee 25%, transparent 25%), 
          linear-gradient(-45deg, #eee 25%, transparent 25%), 
          linear-gradient(45deg, transparent 75%, #eee 75%), 
          linear-gradient(-45deg, transparent 75%, #eee 75%);
        background-size: 20px 20px;
        background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
        border: 1px solid var(--border-color);
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
      }

      canvas {
        max-width: 100%;
        max-height: 100%;
      }

      .header-actions {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 1rem;
      }

      .logout-btn {
        font-size: 0.7rem;
        padding: 0.4rem 0.8rem;
      }
    </style>
  </head>
  <body>
    <div class="app-container">
      <h1>STUDIO PRO 🖋️</h1>
      
      <!-- SECCIÓN AUTENTICACIÓN -->
      <section id="auth-section">
        <div class="card">
          <div class="input-group">
            <label>Email</label>
            <input type="email" id="auth-email" placeholder="correo@ejemplo.com" />
          </div>
          <div class="input-group">
            <label>Contraseña</label>
            <input type="password" id="auth-password" placeholder="••••••••" />
          </div>
          <button id="btn-login" style="width: 100%; margin-bottom: 0.5rem;">Ingresar</button>
          <button id="btn-signup" class="secondary" style="width: 100%;">Crear Cuenta</button>
        </div>
      </section>

      <!-- SECCIÓN APLICACIÓN -->
      <section id="app-section">
        <div class="header-actions">
          <span id="user-display" style="font-size: 0.8rem; opacity: 0.7;">Usuario</span>
          <button id="btn-logout" class="logout-btn secondary">Salir</button>
        </div>

        <div class="card">
          <div class="input-group">
            <label>Subir Fuente (.ttf, .otf)</label>
            <input type="file" id="font-upload" accept=".ttf,.otf" />
          </div>
          <div id="font-list" style="max-height: 200px; overflow-y: auto; margin-top: 1rem;">
            <!-- Lista de fuentes cargadas -->
          </div>
        </div>

        <div class="card">
          <div class="input-group">
            <label>Texto del Sticker</label>
            <input type="text" id="sticker-text" placeholder="Escribe algo..." />
          </div>
          <div id="sticker-preview-container">
            <canvas id="sticker-canvas"></canvas>
          </div>
          <button id="btn-download" style="width: 100%; margin-top: 1rem;">Descargar PNG</button>
        </div>
      </section>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
