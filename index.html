<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sticker Font Studio Pro 🖋️</title>
    <style>
      body { font-family: sans-serif; margin: 2rem; background: #f0f2f5; }
      .app-container { max-width: 800px; margin: 0 auto; background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
      #font-list { margin-top: 1rem; }
      .font-card { border: 1px solid #ddd; padding: 1rem; margin-bottom: 0.5rem; border-radius: 8px; }
      #sticker-canvas { border: 2px dashed #ccc; margin-top: 2rem; width: 100%; height: 200px; display: flex; align-items: center; justify-content: center; background: #fafafa; }
    </style>
  </head>
  <body>
    <div class="app-container">
      <h1>Sticker Font Studio 🖋️</h1>
      <p>Sube tus fuentes .ttf para crear stickers de texto.</p>
      
      <section>
        <input type="file" id="font-upload" accept=".ttf,.otf" />
        <div id="font-list">
          <!-- Las fuentes aparecerán aquí -->
          <p>Cargando lista de fuentes...</p>
        </div>
      </section>

      <section id="sticker-preview">
        <h3>Previsualización de Sticker</h3>
        <input type="text" id="sticker-text" placeholder="Escribe tu texto aquí..." style="width: 100%; padding: 0.5rem; margin-bottom: 1rem; box-sizing: border-box;" />
        <div id="sticker-canvas">
          <!-- Aquí se renderizará el texto con la fuente seleccionada -->
          <span>Elige una fuente para empezar</span>
        </div>
      </section>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
